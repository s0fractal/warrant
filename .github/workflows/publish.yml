name: publish

# Auto-publish `warrant-verify` to PyPI via Trusted Publishing (OIDC) — no stored
# tokens. A GitHub Release named `vX.Y.Z` builds, validates, and publishes.
# `workflow_dispatch` publishes to TestPyPI for a dry run.
# One-time PyPI setup is documented in PUBLISHING.md.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Version matches release tag
        if: github.event_name == 'release'
        run: |
          VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject=$VER tag=$TAG"
          test "$VER" = "$TAG" || { echo "::error::tag v$TAG does not match pyproject version $VER"; exit 1; }
      - name: Validate metadata + that the wheel runs offline
        run: |
          twine check dist/*
          python -m venv /tmp/wv
          /tmp/wv/bin/pip install dist/*.whl
          ( cd /tmp && /tmp/wv/bin/warrant selftest )
          ( cd /tmp && /tmp/wv/bin/warrant conformance "$GITHUB_WORKSPACE/examples" | grep -q "CONFORMANCE: ALL PASS" )
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    # Real, irreversible publish — only from a published GitHub Release.
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write            # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  testpypi:
    # Dry run: manual trigger publishes to TestPyPI.
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
