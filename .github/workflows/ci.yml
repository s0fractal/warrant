name: conformance
on: [push, pull_request]
jobs:
  test:
    # Codex v0.3 hardening audit P2-c: for a repo centered on reproducible
    # settlement, dependencies should be immutable. Actions are still pinned by
    # major tag below — pinning each by commit SHA is a tracked follow-up (the
    # exact digests are not guessed here to avoid a red build). `cryptography`
    # is bounded, and CI runs in strict mode so a skipped ski@v1 case fails.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: python3 -m pip install 'cryptography>=42,<46'
      - name: Conformance (SPEC s8 vectors, byte-exact)
        run: python3 impl/warrant.py conformance examples
      - name: Selftest (live round-trip + tamper detection)
        run: python3 impl/warrant.py selftest
      # The sigma pin is intentionally fixed for reproducible conformance.
      # Refresh ONLY when Book I vectors intentionally change; the refresh
      # commit MUST cite old/new sigma commits + both conformance outputs.
      - name: ski@v1 runtime conformance (SPEC s8.2, oracle = sigma-glyph pinned)
        run: |
          git clone -q https://github.com/s0fractal/sigma-glyph /tmp/sigma-glyph
          git -C /tmp/sigma-glyph checkout -q 01a1def27bb9d482de2502026c06d5365834b36c
          SIGMA_GLYPH=/tmp/sigma-glyph/impl python3 impl/warrant.py conformance examples | grep -q "ski: re-run -> pass"
      - name: Build Go implementation
        run: cd impl-go && go build -o warrant-go .
      - name: Go conformance (second implementation)
        run: ./impl-go/warrant-go conformance examples
      - name: Go sigma-glyph eval conformance (pinned vectors)
        run: ./impl-go/warrant-go sigma-conformance /tmp/sigma-glyph/tests/spec_conformance/vectors.json
      - name: Go selftest (schema and verification edges)
        run: ./impl-go/warrant-go selftest examples
      - name: Go verifies warrant store layout
        run: ./impl-go/warrant-go verify .warrants
      - name: "Cross-implementation agreement: differential + negative + settlement (strict)"
        run: WARRANT_REQUIRE_SIGMA=1 SIGMA_GLYPH=/tmp/sigma-glyph/impl ./tests/agree_check.sh
      - name: Hostile-store hardening (cycles, malformed JSON, unverified ski; Python/Go agree)
        run: python3 tests/hostile.py
      - name: Settlement-grade verification of the repo's own store
        run: |
          python3 impl/warrant.py verify --settlement --trust-config trust-config.json
          ./impl-go/warrant-go verify --settlement --trust-config trust-config.json .warrants
