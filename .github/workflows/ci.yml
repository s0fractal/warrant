name: conformance
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: python3 -m pip install cryptography
      - name: Conformance (SPEC s8 vectors, byte-exact)
        run: python3 impl/warrant.py conformance examples
      - name: Selftest (live round-trip + tamper detection)
        run: python3 impl/warrant.py selftest
      - name: ski@v1 runtime conformance (SPEC s8.2, oracle = sigma-glyph pinned)
        run: |
          git clone -q https://github.com/s0fractal/sigma-glyph /tmp/sigma-glyph
          git -C /tmp/sigma-glyph checkout -q 01a1def27bb9d482de2502026c06d5365834b36c
          SIGMA_GLYPH=/tmp/sigma-glyph/impl python3 impl/warrant.py conformance examples | grep -q "ski: re-run -> pass"
      - name: Go conformance (second implementation)
        run: ./impl-go/warrant-go conformance examples
      - name: Go selftest (schema and verification edges)
        run: ./impl-go/warrant-go selftest examples
      - name: Go verifies warrant store layout
        run: ./impl-go/warrant-go verify .warrants
      - name: Cross-implementation verification agreement
        run: ./tests/agree_check.sh
